<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-adsense-account" content="ca-pub-2186905717180519">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kelp Profit Calculator{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <a class="brand" href="{{ url_for('index') }}">Kelp Profit Calculator</a>

            <nav class="nav-links">
                <a href="{{ url_for('index') }}">Calculator</a>
            </nav>
        </header>

        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}

        {% block content %}{% endblock %}

        <footer class="site-footer">
            <div class="footer-inner">
                <p class="footer-text">Built for Donut SMP players.</p>

                <div class="donate-wrap">
                    <span class="donate-label">Support this project</span>

                    <form action="https://www.paypal.com/donate" method="post" target="_top">
                        <input type="hidden" name="hosted_button_id" value="LHGMF97ZWJSM2">
                        <button type="submit" class="paypal-donate-btn">Donate with PayPal</button>
                    </form>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
